<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajitha ❤️ Pravin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:black;height:100vh;overflow:hidden;color:white}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  bottom:-40px;
  font-size:22px;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(0);opacity:0}
  30%{opacity:1}
  to{transform:translateY(-120vh);opacity:0}
}

/* ROAMING HEARTS */
.roam{
  position:fixed;
  font-size:32px;
  animation:roam 4s infinite alternate, blink 1.5s infinite;
}
@keyframes roam{to{transform:translate(60px,60px)}}
@keyframes blink{50%{opacity:.3}}

/* SECTIONS */
.section{
  position:absolute;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
  display:none;
}
.section.active{display:block}

/* TEXT */
h1{
  font-size:3rem;
  color:red;
  text-shadow:0 0 25px red;
}
h2{margin:15px 0;line-height:1.6}

/* BUTTONS */
button{
  margin:15px;
  padding:14px 32px;
  font-size:1.1rem;
  border:none;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}
button:hover{transform:scale(1.1)}
.yes{background:red;color:white}
.no{background:white;color:red}

/* TYPING */
.typing{border-right:2px solid red;padding-right:6px}

/* CARD */
.card{
  width:240px;height:320px;margin:auto;
  border-radius:20px;overflow:hidden;
  box-shadow:0 0 30px red;cursor:pointer;
}
.card img{width:100%;height:100%;object-fit:cover}

/* PAGE 3 – FLOATING PHOTOS */
.photo-float{
  position:fixed;
  bottom:-180px;
  width:110px;
  height:150px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 25px red;
  animation:photoUp linear infinite;
}
.photo-float img{
  width:100%;
  height:100%;
  object-fit:cover;
}
@keyframes photoUp{
  from{transform:translateY(0) scale(.9);opacity:0}
  30%{opacity:1}
  to{transform:translateY(-130vh) scale(1.1);opacity:0}
}

/* FINAL HEART */
.big-heart{
  font-size:90px;
  animation:beat 1.2s infinite;
  cursor:pointer;
}
@keyframes beat{50%{transform:scale(1.3)}}

/* FIREWORK HEARTS */
.fire{
  position:fixed;
  font-size:26px;
  animation:fire 2s forwards;
}
@keyframes fire{
  to{
    transform:translate(var(--x),var(--y)) scale(1.5);
    opacity:0;
  }
}

/* MOBILE */
@media(max-width:600px){
  h1{font-size:2.2rem}
  h2{font-size:1.05rem;padding:0 15px}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<audio id="kiss">
  <source src="kiss.mp3" type="audio/mpeg">
</audio>

<!-- ROAMING HEARTS -->
<div class="roam" style="top:10%;left:10%">❤️</div>
<div class="roam" style="top:70%;left:80%">💖</div>
<div class="roam" style="top:30%;left:60%">💘</div>

<!-- PAGE 1 -->
<div class="section active" id="p1">
  <h1><span class="typing" id="type"></span></h1>
  <h2>Do you love me forever? 💞</h2>
  <button class="yes" onclick="yesClick()">Yes 💖</button>
  <button class="no" onclick="noClick()">No 💔</button>
  <p id="msg"></p>
</div>

<!-- PAGE 2 -->
<div class="section" id="p2">
  <h1>Our Greeting Card 💝</h1><br>
  <div class="card" onclick="go(3)">
    <img src="photos/photo1.jpg">
  </div>
</div>

<!-- PAGE 3 -->
<div class="section" id="p3">
  <h2>Our Beautiful Memories 💕</h2>
  <h2>
    You are my precious gift 💖<br>
    Forever with you my love 💞
  </h2>
  <button class="yes" onclick="go(4)">❤️</button>
</div>

<!-- PAGE 4 -->
<div class="section" id="p4">
  <h1>Happy Valentine’s Day my love 💘</h1>
  <h2>I love you paa ❤️</h2><br>
  <div class="big-heart" onclick="finalLove()">❤️</div>
  <p>(Touch my heart)</p>
</div>

<script>
/* PAGE SWITCH */
let photoInterval;
function go(n){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  if(n===3) startPhotoFloat();
  else stopPhotoFloat();
}

/* NO */
function noClick(){
  document.getElementById("msg").innerText="Please click YES my love 😘❤️";
}

/* YES */
function yesClick(){
  startBGM(); playKiss(); fireworks(); go(2);
}

/* BGM */
function startBGM(){
  let bgm=document.getElementById("bgm");
  if(bgm.paused){bgm.volume=0.6; bgm.play();}
}

/* TYPING */
let text="Ajitha ❤️ Pravin",i=0;
setInterval(()=>{
  if(i<text.length) document.getElementById("type").innerText+=text[i++];
},150);

/* FLOATING HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart"; h.innerText="❤️";
  h.style.left=Math.random()*100+"%";
  h.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

/* KISS */
function playKiss(){document.getElementById("kiss").play();}

/* FIREWORKS */
function fireworks(){
  for(let i=0;i<30;i++){
    let f=document.createElement("div");
    f.className="fire"; f.innerText="❤️";
    f.style.left="50%"; f.style.top="50%";
    f.style.setProperty("--x",(Math.random()*600-300)+"px");
    f.style.setProperty("--y",(Math.random()*-600)+"px");
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),2000);
  }
}

/* PAGE 3 FLOATING PHOTOS */
const photos=[
 "photo1.jpg","photo2.jpg","photo3.jpg",
 "photo4.jpg","photo5.jpg","photo6.jpg","photo7.jpg"
];

function startPhotoFloat(){
  photoInterval=setInterval(()=>{
    let d=document.createElement("div");
    d.className="photo-float";
    d.style.left=Math.random()*85+"%";
    d.style.animationDuration=(6+Math.random()*4)+"s";
    let img=document.createElement("img");
    img.src="photos/"+photos[Math.floor(Math.random()*photos.length)];
    d.appendChild(img);
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),12000);
  },900);
}

function stopPhotoFloat(){
  clearInterval(photoInterval);
}

/* FINAL */
function finalLove(){playKiss(); fireworks();}
</script>

</body>
</html>
